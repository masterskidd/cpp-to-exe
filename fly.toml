app = "cpp-to-exe"

[build]
  dockerfile = "Dockerfile"

[[services]]
  internal_port = 3000
  protocol = "tcp"

  [[services.ports]]
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls"]
    port = 443

  [[services.concurrency]]
    type = "connections"
    hard_limit = 25
    soft_limit = 10
